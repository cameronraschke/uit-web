<!DOCTYPE html>
<html lang="en-US">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
		<link rel="icon" type="image/png" href="/favicon.png" />
		<link rel="stylesheet" href="/css/desktop.css" />
		<link rel="stylesheet" href="/css/inventory.css" />
		<script nonce="{{ .JsNonce }}" type="text/javascript" src="/js/init.js"></script>
		<title>Inventory - ITSC Mgmt</title>
	</head>
	<body>
		<div id="uit-header"></div>
		<script nonce="{{ .JsNonce }}" type="text/javascript" src="/js/header.js"></script>
		
		<div class="flex-container title pagetitle"><h2>Update and View Inventory</h2></div>

		<section id="update-and-search-container" class="flex-container horizontal">
			<div class="flex-container vertical outlined">
				<div class="flex-container title"><h3>Update Client Information</h3></div>
					<datalist id="location-suggestions"></datalist>
					<div class="flex-container horizontal">
						<button type="button" id="inventory-toggle-bulk">Toggle Bulk Update</button>
					</div>
				<form id="inventory-lookup-form">
					<div class="message"><p id="existing-inventory-message" class="warning-message"></p></div>
					<div class="flex-container vertical">
						<div class="flex-container horizontal"><p>Tag Number/Serial Number Lookup:</p></div>
						<datalist id="inventory-tag-suggestions"></datalist>
						<input type="text" id="inventory-tag-lookup" list="inventory-tag-suggestions"
							class="text-search"
							placeholder="Enter Tag Number"
							minlength="6"
							maxlength="6"
							autocomplete="off"
							autocorrect="off"
							autocapitalize="off"
							pattern="[0-9]{6}"
							autofocus
						/>
						<input type="text" id="inventory-serial-lookup"
							class="text-search"
							placeholder="Enter Serial Number"
							minlength="1"
							maxlength="128"
							autocomplete="off"
							autocorrect="off"
							autocapitalize="off"
							pattern="[A-Za-z0-9\-_]{1,64}"
						/>
						<div class="flex-container horizontal">
							<button type="button" id="inventory-lookup-more-details" class="svg-button info">More Details</button>
							<button type="button" id="inventory-lookup-photo-album" class="svg-button photo-album">View Photos</button>
							<button type="button" id="inventory-lookup-add-photos" class="svg-button add-photo">Add Photos</button>
							<button type="submit" id="inventory-lookup-submit-button" class="svg-button filter-search">Search for Client</button>
						</div>
					</div>
				</form>

				<form id="inventory-bulk-update">
					<div class="message"><p id="bulk-update-message" class="warning-message"></p></div>
					<div class="flex-container vertical">
						<div class="flex-container horizontal"><p>Bulk Update Client Locations:</p></div>
						<div class="flex-container vertical">
							<label class="required-field" for="location">Enter Location: </label>
							<input type="text" id="bulk_location" name="bulk_location"
								placeholder="Enter Location..."
								maxlength="128"
								autocomplete="off"
								autocorrect="off"
								autocapitalize="on"
								list="location-suggestions" />
						</div>
						<div class="flex-container vertical">
							<label for="bulk_tagnumbers">Tags (Separate by New Lines):</label>
							<textarea id="bulk_tagnumbers" name="bulk_tagnumbers" placeholder="Enter tags..." maxlength="1024" rows="20" cols="10"></textarea>
						</div>
						<div class="flex-container horizontal form-buttons">
							<button id="inventory-bulk-update-cancel" name="inventory-bulk-update-cancel"
								type="button"
								class="svg-button cancel">
								Cancel
							</button>
							<button id="inventory-bulk-update-submit" name="inventory-bulk-update-submit" 
								type="button"
								class="submit">
								Submit Inventory Update
							</button>
						</div>
					</div>
				</form>

				<form id="inventory-update-form" enctype="multipart/form-data" method="POST" action="/api/inventory/update">
					<div class="flex-container vertical">
						<div class="message"><p id="existing-inventory-message" class="warning-message"></p></div>
						<div class="message"><p id="last-update-time-message" class="warning-message"></p></div>
						<input type="hidden" id="csrf-token" value="" />
						<input type="file" id="inventory-file-input" name="inventory-file-input" 
							accept="image/jpeg,image/jpg,image/png,video/mp4" 
							multiple />
						<div class="tabs-container inventory-update-form">
							<button type="button" id="show-location-data">Location</button>
							<button type="button" id="show-hardware-data">Hardware</button>
							<button type="button" id="show-software-data">Software</button>
							<button type="button" id="show-property-data">Property/Checkouts</button>
							<button type="button" id="show-notes-files-data">Notes/Media</button>
						</div>
						<div id="inventory-form-container" class="flex-container horizontal">
							<div class="flex-container vertical separated" data-location-part>
								<div class="flex-container vertical">
									<label class="required-field" for="location">Location: </label>
									<input type="text" id="location" name="location"
										placeholder="Location"
										maxlength="128"
										autocomplete="off"
										autocorrect="off"
										autocapitalize="on"
										list="location-suggestions" />
								</div>
								<div class="flex-container vertical">
									<label class="required-field" for="department_name">Department: </label>
									<select id="department_name" name="department_name"></select>
								</div>
							</div>
							<div class="flex-container vertical separated" data-location-part>
								<div class="flex-container vertical">
									<label for="building">Building: </label>
									<input type="text" id="building" name="building"
										placeholder="Building"
										maxlength="64"
										autocomplete="off"
										autocorrect="off"
										autocapitalize="on" />
								</div>
								<div class="flex-container vertical">
									<label for="room">Room: </label>
									<input type="text" id="room" name="room"
										placeholder="Room"
										maxlength="64"
										autocomplete="off"
										autocorrect="off"
										autocapitalize="on" />
								</div>
							</div>

							<div class="flex-container vertical separated" data-hardware-part>
								<div class="flex-container vertical">
									<label for="manufacturer">Manufacturer: </label>
									<input type="text" id="system_manufacturer" name="system_manufacturer"
										placeholder="Manufacturer" 
										maxlength="128" 
										autocomplete="off"
										autocorrect="off"
										autocapitalize="on" />
								</div>
								<div class="flex-container vertical">
									<label for="system_model">Model No.: </label>
									<input type="text" id="system_model" name="system_model"
										placeholder="Model" 
										maxlength="128" 
										autocomplete="off"
										autocorrect="off"
										autocapitalize="on" />
								</div>
								<div class="flex-container vertical">
									<label for="device_type">Device Type: </label>
									<select id="device_type" name="device_type"></select>
								</div>
							</div>

							<div class="flex-container vertical separated" data-hardware-part>
								<div class="flex-container vertical">
									<label for="is_broken">Is it Functional?</label>
									<select id="is_broken" name="is_broken">
										<option value="" disabled selected>Is it Working?</option>
										<option value="false">Yes, it is working</option>
										<option value="true">No, it is broken</option>
										<option value="unknown">Unknown</option>
									</select>
								</div>
								<div class="flex-container vertical">
									<label for="disk_removed">Is the Disk Present?</label>
									<select id="disk_removed" name="disk_removed"></select>
								</div>
								<div class="flex-container vertical">
									<label for="last_hardware_check">Last Hardware Check</label>
									<input type="datetime-local" id="last_hardware_check" name="last_hardware_check" />
								</div>
							</div>

							<div class="flex-container vertical separated" data-software-part>
								<div class="flex-container vertical">
									<label for="ad_domain" class="required-field">AD Domain: </label>
									<select id="ad_domain" name="ad_domain"></select>
								</div>
							</div>
							<div class="flex-container vertical separated" data-software-part>
								<div class="flex-container vertical">
									<label for="os_updated">OS Updated: </label>
									<select id="os_updated" name="os_updated" disabled>
										<option value="" selected>Placeholder</option>
									</select>
								</div>
							</div>

							<div class="flex-container vertical separated" data-property-part>
								<div class="flex-container vertical">
									<label for="property_custodian">Property Custodian</label>
									<input type="text" id="property_custodian" name="property_custodian"
										placeholder="Property Custodian" 
										maxlength="64" 
										autocomplete="off"
										autocorrect="off"
										autocapitalize="words" />
								</div>
								<div class="flex-container vertical">
									<label for="acquired_date">Acquired Date</label>
									<input type="date" id="acquired_date" name="acquired_date" />
								</div>
								<div class="flex-container vertical">
									<label for="retired_date">Retired Date</label>
									<input type="date" id="retired_date" name="retired_date" />
								</div>
							</div>

							<div class="flex-container vertical separated" data-property-part>
								<div class="flex-container vertical">
									<label for="customer_name">Customer Name: </label>
									<input id="customer_name" name="customer_name" type="text" disabled placeholder="Placeholder">
								</div>
								<div class="flex-container vertical">
									<label for="checkout_date">Checkout Date: </label>
									<input type="date" id="checkout_date" name="checkout_date" value="" />
								</div>
								<div class="flex-container vertical">
									<label for="return_date">Return Date: </label>
									<input type="date" id="return_date" name="return_date" value="" />
								</div>
							</div>

							<div class="flex-container vertical separated" data-note-files-part>
								<div class="flex-container vertical">
									<label for="status" class="required-field">Overall Status: </label>
									<select id="status" name="status">
										<option value="" disabled selected>Select Status</option>
									</select>
								</div>
								<div id="print-checkout-container" class="flex-container horizontal"><a id="print-checkout-link"></a></div>
								<div class="flex-container vertical">
									<label for="note">Notes:</label>
									<textarea id="note" name="note" placeholder="Enter notes..." maxlength="1024" rows="6" cols="50"></textarea>
								</div>
							</div>
						<!-- Close grid -->
						</div> 

						

						<div class="flex-container horizontal"><div class="message"><p id="inventory-error" class="error-message"></p></div></div>
						<div class="flex-container horizontal form-buttons">
							<button id="inventory-update-cancel-button" name="inventory-update-cancel-button"
								type="button"
								class="svg-button cancel">
								Cancel
							</button>
							<button id="inventory-update-submit-button" name="inventory-update-submit-button" 
								type="submit"
								class="submit">
								Submit Inventory Update
							</button>
						</div>
					</div>
				</form>
			</div>

			<div class="flex-container vertical outlined">
				<form id="adv-search-form">
					<div class="flex-container vertical">
						<div class="flex-container vertical"><h3>Advanced Search</h3></div>
						<div class="flex-container vertical">
							<div class="flex-container horizontal">
								<input type="checkbox" id="adv-search-location-negation">
								<select id="adv-search-location" name="filter_location" form="adv-search-form" class="svg-select location"></select>
								<a id="adv-search-location-reset" class="adv-search-reset" href="">x</a>

								<input type="checkbox" id="adv-search-building-room-negation">
								<select id="adv-search-building-room" name="filter_building" form="adv-search-form" class="svg-select building"></select>
								<a id="adv-search-building-room-reset" class="adv-search-reset" href="">x</a>
							</div>

							<div class="flex-container horizontal">
								<input type="checkbox" id="adv-search-manufacturer-negation">
								<select id="adv-search-manufacturer" name="filter_manufacturer" form="adv-search-form" class="svg-select manufacturer"></select>
								<a id="adv-search-manufacturer-reset" class="adv-search-reset" href="">x</a>

								<input type="checkbox" id="adv-search-model-negation">
								<select id="adv-search-model" name="filter_model" form="adv-search-form"></select>
								<a id="adv-search-model-reset" class="adv-search-reset" href="">x</a>
							</div>

							<div class="flex-container horizontal">
								<input type="checkbox" id="adv-search-department-negation">
								<select id="adv-search-department" name="filter_department_name" form="adv-search-form" class="svg-select department"></select>
								<a id="adv-search-department-reset" class="adv-search-reset" href="">x</a>

								<input type="checkbox" id="adv-search-ad-domain-negation">
								<select id="adv-search-ad-domain" name="filter_ad_domain" form="adv-search-form" class="svg-select domain"></select>
								<a id="adv-search-ad-domain-reset" class="adv-search-reset" href="">x</a>
							</div>

							<div class="flex-container horizontal">
								<input type="checkbox" id="adv-search-status-negation">
								<select id="adv-search-status" name="filter_status" form="adv-search-form" class="svg-select status"></select>
								<a id="adv-search-status-reset" class="adv-search-reset" href="">x</a>

								<input type="checkbox" id="adv-search-is-broken-negation">
								<select id="adv-search-is-broken" name="filter_is_broken" form="adv-search-form" class="svg-select is-broken">
									<option value="" disabled selected>Broken?</option>
									<option value="true">Yes - Is broken</option>
									<option value="false">No - Is functional</option>
								</select>
								<a id="adv-search-is-broken-reset" class="adv-search-reset" href="">x</a>
							</div>

							<div class="flex-container horizontal">
								<input type="checkbox" id="adv-search-has-images-negation">
								<select id="adv-search-has-images" name="filter_has_images" form="adv-search-form" class="svg-select image-search">
									<option value="" disabled selected>Has Images?</option>
									<option value="true">Yes - Has images</option>
									<option value="false">No - Missing images</option>
								</select>
								<a id="adv-search-has-images-reset" class="adv-search-reset" href="">x</a>

								<input type="checkbox" id="adv-search-device-type-negation" name="filter_device_type_negation">
								<select id="adv-search-device-type" name="filter_device_type" form="adv-search-form" class="svg-select device-type"></select>
								<a id="adv-search-device-type-reset" class="adv-search-reset" href="">x</a>
							</div>
							
							<div class="flex-container horizontal form-buttons">
								<button id="adv-search-form-reset-button" type="button" class="svg-button cancel subtle">Reset Search</button>
								<button type="submit" class="svg-button download submit" id="adv-search-download-csv">Download Results</button>
							</div>
						</div>
					</div>
				</form>
			</div>
		</section>

		<section>
			<div class="flex-container vertical">
				<div id="inventory-table-search-container" class="flex-container horizontal">
					<input id="inventory-table-search" name="inventory-table-search"
						class="text-search"
						type="text" 
						placeholder="Search..."
					/>
					<select id="inventory-table-sort-by">
						<option value="time-desc" selected>Sort by Time (Desc)</option>
						<option value="time-asc">Sort by Time (Asc)</option>
						<option value="tagnumber-asc">Sort by Tag # (Asc)</option>
						<option value="tagnumber-desc">Sort by Tag # (Desc)</option>
						<option value="serial-asc">Sort by Serial No. (Asc)</option>
						<option value="serial-desc">Sort by Serial No. (Desc)</option>
						<option value="location-asc">Sort by Location (A-Z)</option>
						<option value="location-desc">Sort by Location (Z-A)</option>
					</select>
					<p id="inventory-table-rowcount">0 entries</p>
				</div>
				<table id="inventory-table">
					<thead>
						<tr>
							<th>Actions</th>
							<th>IDs</th>
							<th>Location</th>
							<th>Hardware Info</th>
							<th>AD Domain</th>
							<th>Status</th>
							<th>Notes</th>
							<th>Last Entry</th>
						</tr>
					</thead>
					<tbody id="inventory-table-body">
						<tr><td colspan="8">Loading inventory...</td></tr>
					</tbody>
				</table>
			</div>
		</section>

		<div id="uit-footer" class="flex-container footer"></div>
		<script nonce="{{ .JsNonce }}" type="text/javascript" src="/js/footer.js"></script>
		<script nonce="{{ .JsNonce }}" type="text/javascript" src="/js/inventory_types.js"></script>
		<script nonce="{{ .JsNonce }}" type="text/javascript" src="/js/inventory_table.js"></script>
		<script nonce="{{ .JsNonce }}" type="text/javascript" src="/js/inventory_filters.js"></script>
		<script nonce="{{ .JsNonce }}" type="text/javascript" src="/js/inventory.js"></script>
	</body>
</html>
